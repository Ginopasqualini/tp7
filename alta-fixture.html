<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrar Encuentro - Gestión de Fixtures</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Registrar Encuentro</h1>
      <p class="subtitle">Carga de jornadas y enfrentamientos</p>
    </div>
  </header>

  <nav class="site-nav">
    <div class="container nav-inner">
      <a href="./index.html" class="nav-link">Dashboard</a>
      <a href="./alta-fixture.html" class="nav-link">Registrar Encuentro</a>
      <a href="./ver-fixture.html" class="nav-link">Ver Fixture</a>
    </div>
  </nav>

  <main class="container main-content">
    <form>
      <div class="form-group">
        <label for="equipo1">Equipo Local</label>
        <select name="equipo1" id="equipo1" required>
          <option value="">Selecciona un equipo</option>
        </select>
      </div>

      <div class="form-group">
        <label for="equipo2">Equipo Visitante</label>
        <select name="equipo2" id="equipo2" required>
          <option value="">Selecciona un equipo</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fecha">Fecha</label>
        <input type="date" name="fecha" id="fecha" required>
      </div>

      <div class="form-group">
        <label for="hora">Hora</label>
        <input type="time" name="hora" id="hora" required>
      </div>

      <div class="form-group">
        <label for="ubicacion">Sede / Cancha</label>
        <input type="text" name="ubicacion" id="ubicacion" placeholder="Estadio, cancha o sala" required>
      </div>

      <button type="submit" class="btn">REGISTRAR ENCUENTRO</button>
      <button type="reset" class="btn btn-secondary" style="margin-left: 10px;">RESTABLECER</button>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 - Sistema de Gestión de Fixtures</p>
    </div>
  </footer>

  <script src="./js/fixtures.js" defer></script>
</body>
</html>
